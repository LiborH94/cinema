services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: cinema-app
    volumes:
      - .:/var/www
    working_dir: /var/www

  nginx:
    image: nginx:alpine
    container_name: cinema-nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
